    let currentDay = 'day1';

    function showPage(page) {
            const container = document.getElementById('content-area');
            const navItinerary = document.getElementById('nav-itinerary');
            const navTools = document.getElementById('nav-tools');
            const navWeather = document.getElementById('nav-weather');

            navItinerary.classList.remove('tab-active');
            navTools.classList.remove('tab-active');
            navWeather.classList.remove('tab-active');

            if (page === 'itinerary') {
                navItinerary.classList.add('tab-active');
                renderItinerary(container, currentDay);
            } else if (page === 'tools') {
                navTools.classList.add('tab-active');
                renderTools(container);
            } else if (page === 'weather') {
                navWeather.classList.add('tab-active');
                renderWeather(container);
            }
    }

    function renderItinerary(container, dayKey = 'day1') {

                ${Object.keys(itinerary).map(key => `
                    <button onclick="renderItinerary(document.getElementById('content-area'), '${key}')" 
                            class="flex flex-col items-center justify-center w-20 h-20 rounded-2xl flex-shrink-0 transition-all duration-200 ${currentDay === key ? 'bg-[#5c544d] text-white shadow-lg scale-105' : 'sticker-card hover:-translate-y-1 hover:shadow-md'}">
                        <span class="font-bold text-lg">${itinerary[key].tabDay}</span>
                        <span class="text-xs mt-1 ${currentDay === key ? 'text-stone-300' : 'text-stone-500'}">${itinerary[key].tabDate}</span>
                    </button>
                `).join('')}
            </div>
        `;

        const dayData = itinerary[currentDay];
        html += `<h2 class="text-xl font-bold border-b-2 border-stone-300 pb-2 mb-4">${dayData.title}</h2>
                 <div class="relative timeline-line space-y-6">`;
        
        dayData.items.forEach(item => {
            if (item.type === 'location') {
                html += `
                        <div class="ml-8 p-4 sticker-card relative">
                            <div class="absolute -left-5 top-4 w-4 h-4 rounded-full bg-[#5c544d] border-2 border-white"></div>
                            <h3 class="font-bold text-lg">${item.name}</h3>
                            <p class="text-xs mb-2 opacity-70">📍 ${item.address}</p>
                `;

                if (item.image) {
                    html += `
                            <div class="mb-3 rounded-xl overflow-hidden shadow-sm border border-stone-100 aspect-square">
                                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                            </div>
                    `;
                }

                html += `
                            <p class="text-sm italic text-stone-600 mb-3">${item.note}</p>
                `;

                if (item.subOptions) {
                    html += `<div class="mt-3 flex flex-col gap-3">`;
                    item.subOptions.forEach(sub => {
                        const linkHref = sub.address.startsWith('http') ? sub.address : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(sub.address)}`;
                        html += `
                            <a href="${linkHref}" target="_blank" 
                               class="flex items-center p-3 rounded-xl border border-stone-200 bg-[#fdfbf7] hover:bg-white transition-all shadow-sm hover:shadow-md hover:-translate-y-1 cursor-pointer">
                                <span class="text-2xl mr-3">${sub.icon}</span>
                                <div>
                                    <h4 class="font-bold text-sm text-[#5c544d]">${sub.name}</h4>
                                    <p class="text-xs text-stone-500 mt-0.5">${sub.desc}</p>
                                </div>
                            </a>
                        `;
                    });
                    html += `</div>`;
                } else {
                    html += `
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(item.address)}" target="_blank" 
                               class="inline-block bg-[#f0ede5] hover:bg-[#e0dcd0] px-3 py-1 rounded-full text-xs font-bold transition">
                               🚗 點擊導航
                            </a>
                    `;
                }
                html += `</div>`;
            } else if (item.type === 'transport') {
                html += `
                    <div class="ml-8 relative flex justify-center py-2">
                        <div class="bg-[#f0ede5] border border-[#e5e5e5] px-4 py-2 rounded-full text-xs font-bold text-[#5c544d] shadow-sm z-10 text-center w-full max-w-[80%] break-words">
                            ${item.text}
                        </div>
                    </div>
                `;
            } else if (item.type === 'alert') {
                html += `
                    <div class="ml-8 p-4 sticker-card relative bg-[#fff5f5] border-[#feb2b2] shadow-sm">
                        <div class="absolute -left-5 top-4 w-4 h-4 rounded-full bg-red-500 border-2 border-white animate-pulse"></div>
                        <h3 class="font-bold text-lg text-red-600">${item.text}</h3>
                        <p class="text-sm text-red-500 mt-1 font-medium">${item.subtext}</p>
                    </div>
                `;
            }
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    function renderTools(container) {
            container.innerHTML = `
                <div class="sticker-card p-6">
                    <h2 class="text-xl font-bold mb-4">💰 匯率計算機</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">消費金額 (USD)</label>
                            <input type="number" id="usd-amt" oninput="calc()" class="w-full p-3 border-2 border-stone-200 rounded-lg" placeholder="例如: 100">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">州稅 (%)</label>
                            <div class="flex gap-2 mb-3">
                                <button onclick="setTax(8.625)" class="flex-1 bg-[#f0ede5] hover:bg-[#e0dcd0] px-3 py-2 rounded-lg text-xs font-bold transition text-center shadow-sm text-[#5c544d]">📍 舊金山 8.625%</button>
                                <button onclick="setTax(10.25)" class="flex-1 bg-[#f0ede5] hover:bg-[#e0dcd0] px-3 py-2 rounded-lg text-xs font-bold transition text-center shadow-sm text-[#5c544d]">🛍️ Livermore 10.25%</button>
                            </div>
                            <input type="number" id="tax-rate" step="0.001" oninput="calc()" class="w-full p-3 border-2 border-stone-200 rounded-lg" value="8.625">
                        </div>
                        <div class="pt-4 border-t border-stone-100">
                            <p class="text-sm">實付金額: <span id="total-usd" class="font-bold text-lg">0</span> USD</p>
                            <p class="text-sm">換算台幣: <span id="total-twd" class="font-bold text-lg text-[#5c544d]">0</span> TWD</p>
                            <p class="text-[10px] opacity-50 mt-2">*匯率以 1 USD = 32.5 TWD 參考計算</p>
                        </div>
                    </div>
                </div>
            `;
    }

    function renderWeather(container) {
        container.innerHTML = `
            <div class="sticker-card p-6">
                <h2 class="text-xl font-bold text-[#5c544d] mb-6 flex items-center">
                    <span>🌤️天氣預報</span>
                </h2>
                <div class="flex flex-col gap-8">
                    <div>
                        <h3 class="text-md font-semibold text-gray-700 mb-2">🌉 舊金山 San Francisco</h3>
                        <a class="weatherwidget-io" href="https://forecast7.com/zh-tw/37d77n122d42/san-francisco/" data-label_1="舊金山" data-label_2="天氣預報" data-theme="pure" >舊金山 天氣預報</a>
                    </div>
                    <div>
                        <h3 class="text-md font-semibold text-gray-700 mb-2">🏔️ 優勝美地 Yosemite</h3>
                        <a class="weatherwidget-io" href="https://forecast7.com/zh-tw/37d75n119d59/yosemite-valley/" data-label_2="天氣預報" data-theme="pure" >優勝美地 天氣預報</a>
                    </div>
                </div>
            </div>
        `;
        
        const oldScript = document.getElementById('weatherwidget-io-js');
        if (oldScript) {
            oldScript.remove();
        }
        const script = document.createElement('script');
        script.id = 'weatherwidget-io-js';
        script.src = 'https://weatherwidget.io/js/widget.min.js';
        document.body.appendChild(script);
    }

    function setTax(rate) {
            document.getElementById('tax-rate').value = rate;
            calc();
        }

        function calc() {
            const usd = parseFloat(document.getElementById('usd-amt').value) || 0;
            const tax = parseFloat(document.getElementById('tax-rate').value) || 0;
            const totalUsd = usd * (1 + tax / 100);
            document.getElementById('total-usd').innerText = totalUsd.toFixed(2);
            document.getElementById('total-twd').innerText = (totalUsd * 32.5).toFixed(0);
        }

        // Initialize
        showPage('itinerary');
    </script>
</body>
</html>
    
  </body>
  
</html>
